name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java JDK 17 (Required for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node Dependencies
        run: npm install

      - name: Sync Capacitor Web Assets and Configs
        run: npx cap sync

      - name: Build Debug Android APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled APK as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedTech-Android-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
